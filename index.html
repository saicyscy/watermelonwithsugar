<!DOCTYPE html>
<html>
<head>
    <title>justbecause ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #ffe6f0;
            margin-top: 100px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
        }

        #message {
            font-size: 24px;
            color: hotpink;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Will you be my girlfriend? ❤️</h1>

    <button onclick="yesClicked()">Yes</button>
    <button onclick="moveButton(this)">No</button>

    <p id="message"></p>

    <script>
        function yesClicked() {
            document.getElementById("message").innerHTML =
                "YAYYY ❤️ You have no choice,nuh? that's okay pookie, i love you anyway!";
        }

        function moveButton(button) {
            button.style.position = "absolute";
            button.style.left = Math.random() * 80 + "%";
            button.style.top = Math.random() * 80 + "%";
        }
    </script>

</body>
</html>
